  intro:
    text: "Public health is fundamentally spatial. From tracking the spread of infectious diseases and identifying disparities in healthcare access to modeling the health impacts of climate change, geospatial data and computational methods play a central role in understanding and improving population health. The 2nd ACM SIGSPATIAL International Workshop on Geospatial Computing for Public Health (GeoHealth’26) aims to advance research and practice at this critical intersection by encompassing a broad range of public health challenges, data sources, and analytical approaches. 
    As health informatics enters a new era, the importance of geospatial data continues to grow. Applications now span infectious disease surveillance and forecasting, chronic disease monitoring, environmental exposure assessment, healthcare accessibility, and the allocation of limited public health resources. These challenges demand scalable, robust, and privacy-aware geospatial solutions capable of integrating heterogeneous and spatiotemporal data.  
    The SIGSPATIAL community brings decades of expertise in managing, analyzing, and visualizing complex spatial and spatiotemporal data. When combined with emerging public health data sources (e.g., wearable devices, mobile sensors, social media, climate observations, and administrative health records), this expertise uniquely positions the community to make significant contributions to geospatial health informatics and evidence-based public health decision-making"

  cfp:
    text: "GeoHealth’26 will serve as an interdisciplinary forum for researchers, practitioners, and policymakers working at the nexus of geospatial computing and public health. The workshop welcomes contributions that address spatial and spatiotemporal aspects of health behaviors, outcomes, exposures, systems, and interventions using methods from spatial databases, GIScience, geoinformatics, spatial data mining, machine learning, and computational modeling. We particularly encourage submissions that introduce novel geospatial methodologies, leverage emerging or nontraditional data sources, or present innovative applications with clear implications for public health policy and practice. Both full papers (8–10 pages) and short papers (4 pages) are welcome, provided they have not been previously published and are not under concurrent review. All accepted papers will be published in the ACM Digital Library. At least one author of each accepted paper must register for and attend the workshop in person."

    keywords: ["Geospatial Analytics for Infectious Disease Surveillance",
              "Environmental Exposure Mapping (e.g., air quality, water, toxins)",
              "Modeling Health Impacts of Climate Change",
              "GIS for Health Equity and Access",
              "Spatial Decision Support Systems for Health Resource Allocation",
              "Urban Health and Built Environment Analysis",
              "Chronic Disease Mapping and Risk Factor Modeling",
              "Human Mobility and Public Health Interventions",
              "Integration of Remote Sensing and Health Data",
              "Real-time Outbreak Detection and Monitoring",
              "Geospatial Artificial Intelligence (GeoAI) in Health",
              "Privacy-aware Health Data Integration",
              "Social Determinants of Health and Spatial Inequality ",
              "Data Fusion from Wearables, EHRs, and Census Data",
              "Health Communication via Spatial Dashboards and Visualizations",
              "Spatial Epidemiology and Spatiotemporal Modeling"]

